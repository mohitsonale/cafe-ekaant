kind = "web"
previewPath = "/"
title = "Cafe Ekaant"
version = "1.0.0"
id = "artifacts/cafe-ekaant"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23822

[services.development]
run = "pnpm --filter @workspace/cafe-ekaant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cafe-ekaant", "run", "build" ]
serve = "static"
publicDir = "artifacts/cafe-ekaant/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23822"
BASE_PATH = "/"
